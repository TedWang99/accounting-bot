          category: $('add-category').value, payment: $('add-payment').value,
          card: $('add-card').value
        }, !!force);
        console.log('[ADD] force=', !!force, 'res=', JSON.stringify(res));
        if (res.duplicateFound) {
          // 伺服器偵測到重複（兜底保障）
          showDupWarning(res.dup);
        } else if (res.success) {
          clearDupWarning();
          toast('✅ 記帳成功！'); showView('view-dashboard'); renderDashboard();
        } else {
          $('add-error').textContent = res.error || '新增失敗';
        }
      } catch (e) { $('add-error').textContent = '連線錯誤'; }
      finally { $('btn-submit').disabled = false; $('btn-dup-confirm').disabled = false; }
    }

    $('btn-submit').addEventListener('click', async () => {
      const item = $('add-item').value.trim(), amount = parseFloat($('add-amount').value);
      if (!item) { $('add-error').textContent = '請填入品名'; return; }
      if (!amount || isNaN(amount)) { $('add-error').textContent = '請填入有效金額'; return; }
      $('add-error').textContent = '';
      // 掃描後已快取重複結果 → 直接擋住，不另開 server 呼叫
      if (S.pendingDup) { showDupWarning(S.pendingDup); return; }
      // 否則呼叫 webAddRecord（內含重複偵測，check + add 一次完成）
      await doAddRecord(false);
    });

    $('btn-dup-confirm').addEventListener('click', () => doAddRecord(true));
    $('btn-dup-cancel').addEventListener('click', clearDupWarning);

    // ── Scan Receipt ─────────────────────────────────
    function compressImage(file) {
      return new Promise(resolve => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const scale = Math.min(1, 1024 / Math.max(img.width, img.height));
          const c = document.createElement('canvas');
          c.width = Math.round(img.width * scale);
          c.height = Math.round(img.height * scale);
          c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
          URL.revokeObjectURL(url);
          c.toBlob(blob => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result.split(',')[1]);
            reader.readAsDataURL(blob);
          }, 'image/jpeg', 0.8);
        };
        img.src = url;
      });
    }

    $('btn-scan-receipt').addEventListener('click', () => $('scan-input').click());

    $('scan-input').addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      const previewUrl = URL.createObjectURL(files[0]);
      $('scan-preview').src = previewUrl;
      $('scan-status').style.display = 'block';
      $('scan-msg').textContent = files.length > 1 ? `🔍 AI 辨識 ${files.length} 張圖片中…` : '🔍 AI 辨識中…';
      $('btn-scan-receipt').disabled = true;
      clearDupWarning();
      try {
        const imagesData = await Promise.all(files.map(async f => ({
          mimeType: 'image/jpeg', data: await compressImage(f)
        })));
        const res = files.length > 1
          ? await run('webScanReceiptMulti', S.token, imagesData)
          : await run('webScanReceipt', S.token, imagesData[0].data, 'image/jpeg');
        if (res.success) {
          const d = res.data;
          if (d.item) $('add-item').value = d.item;
          if (d.amount) $('add-amount').value = Math.abs(d.amount);
          if (d.date) $('add-date').value = d.date;
          if (d.category && S.config && S.config.categories.includes(d.category))
            $('add-category').value = d.category;
          if (d.payment) {
            $('add-payment').value = d.payment;
            updateCardGroup();
          }
          if (d.card_last4 && S.config && S.config.cards) {
            const match = S.config.cards.find(c => c.includes(d.card_last4));
            if (match) $('add-card').value = match;
          }
          $('scan-msg').textContent = files.length > 1 ? `✅ ${files.length} 張辨識完成，請確認後記帳` : '✅ 辨識完成，請確認後記帳';
          // ── 掃描後自動重複偵測 ──
          try {
            const scanDate = $('add-date').value;
            const scanAmt = parseFloat($('add-amount').value);
            if (scanDate && scanAmt) {
              const dupRes = await run('webCheckDuplicate', S.token, scanDate, scanAmt);
              console.log('[DUP CHECK] scanDate=', scanDate, 'scanAmt=', scanAmt, 'res=', JSON.stringify(dupRes));
              if (dupRes.duplicates && dupRes.duplicates.length > 0) {
                showDupWarning(dupRes.duplicates[0]);
                $('scan-msg').textContent = '⚠️ 辨識完成，但發現可能重複，請確認！';
              }
            }
          } catch (dupErr) { console.warn('[DUP CHECK ERROR]', dupErr); }
        } else {
          $('scan-msg').textContent = '⚠️ ' + (res.error || '辨識失敗，請手動輸入');
        }
      } catch (err) {
        $('scan-msg').textContent = '❌ 連線錯誤';
      } finally {
        $('btn-scan-receipt').disabled = false;
        $('scan-input').value = '';
        URL.revokeObjectURL(previewUrl);
      }
    });

    // ── CSV Export ────────────────────────────────────
    function exportCSV() {
      if (!S.data || !S.data.records.length) { toast('⚠️ 沒有資料可匯出'); return; }
      const headers = ['日期', '品名', '金額', '記錄人', '付款方式', '分類', '卡別'];
      const rows = S.data.records.map(r => [
        `${S.year}/${r.date}`, r.item, r.amount, r.person, r.payment, r.category, r.card || ''
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
      const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `記帳_${S.year}年${S.month}月.csv`; a.click();
      URL.revokeObjectURL(url);
      toast('📤 CSV 已下載');
    }

    // ── Start ─────────────────────────────────────────
    init();
  </script>
</body>

</html>
